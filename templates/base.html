<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Billing{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --accent: #635bff;
      --accent-hover: #4f46e5;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --cancel: #dc2626;
      --cancel-bg: #fef2f2;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.5rem;
    }

    .icon--accent { background: #ede9fe; color: var(--accent); }
    .icon--success { background: var(--success-bg); color: var(--success); }
    .icon--cancel  { background: var(--cancel-bg); color: var(--cancel); }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .price {
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .price-note {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 0.85rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn:active { transform: scale(0.98); }

    .btn--primary {
      background: var(--accent);
      color: #fff;
    }

    .btn--primary:hover { background: var(--accent-hover); }

    .btn--secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn--secondary:hover { background: var(--border); }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .footer svg { vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
